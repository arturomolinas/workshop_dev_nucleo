# =============================================================================
# application.properties — metrics-demo
# =============================================================================
quarkus.application.name=metrics-demo

# ─── HTTP ────────────────────────────────────────────────────────
quarkus.http.port=8080

# =============================================================================
# MÉTRICAS — Micrometer + Prometheus
# =============================================================================

# Ruta del endpoint de métricas — Prometheus scrapeará esta URL
# El ServiceMonitor apuntará a esta misma ruta
quarkus.micrometer.export.prometheus.path=/q/metrics

# Activar métricas de JVM (memoria, GC, threads)
quarkus.micrometer.binder.jvm=true

# Activar métricas del sistema (CPU)
quarkus.micrometer.binder.system=true

# Activar métricas de HTTP (latencia, conteo por ruta/método/status)
quarkus.micrometer.binder.http-server.enabled=true

# Tags globales — aparecen en TODAS las métricas de esta app
# Útil para filtrar en Prometheus cuando hay varios servicios
#quarkus.micrometer.tags.application=metrics-demo
#quarkus.micrometer.tags.environment=workshop

# =============================================================================
# LOGGING
# =============================================================================
quarkus.log.level=INFO
quarkus.log.category."com.workshop".level=DEBUG

%dev.quarkus.log.handler.json.enabled=false
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.level=DEBUG

# =============================================================================
# HEALTH
# =============================================================================
quarkus.smallrye-health.root-path=/health
