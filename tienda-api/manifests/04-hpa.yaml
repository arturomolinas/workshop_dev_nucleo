# =============================================================
# 04 - HorizontalPodAutoscaler
#      Target: Deployment blue (versión estable en producción)
#      Escala entre 2 y 8 pods según uso de CPU
# =============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tienda-api-hpa
  labels:
    app: tienda-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tienda-api-blue
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30      # reacciona rápido ante picos
      policies:
      - type: Pods
        value: 2                           # sube de a 2 pods por vez
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120     # baja lento para evitar flapping
      policies:
      - type: Pods
        value: 1                           # baja de a 1 pod por vez
        periodSeconds: 60
