# ── Servidor ─────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# ── Aplicación ───────────────────────────────────────────────────────────────
quarkus.application.name=tienda-api
quarkus.application.version=v3

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.liveness-path=/health/live
quarkus.smallrye-health.readiness-path=/health/ready

# ── JSON Logging (quarkus-logging-json) ──────────────────────────────────────
#
# Con esta extensión, cada línea de log es un objeto JSON válido:
# {
#   "timestamp":     "2025-01-15T10:30:00.000Z",
#   "level":         "INFO",
#   "loggerName":    "com.workshop.tienda.resource.ProductoResource",
#   "message":       "productos_filtrados",
#   "correlationId": "abc-123-...",    ← desde MDC
#   "mdc": { "categoria": "audio", "total": "2" }
# }
#
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ
quarkus.log.console.json.zone-id=UTC

# Incluir el nombre del host (pod) en cada línea
quarkus.log.console.json.additional-field."host".value=${HOSTNAME:local}
quarkus.log.console.json.additional-field."host".type=string

# Incluir versión de la app en cada línea
quarkus.log.console.json.additional-field."appVersion".value=v3
quarkus.log.console.json.additional-field."appVersion".type=string

# ── Nivel de log ─────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.workshop.tienda".level=DEBUG

# Reducir ruido de frameworks en producción
quarkus.log.category."io.quarkus".level=WARN
quarkus.log.category."io.netty".level=WARN
quarkus.log.category."org.jboss".level=WARN

# ── Métricas Prometheus ───────────────────────────────────────────────────────
# Expone /q/metrics para Prometheus / OpenShift Monitoring
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ── Packaging ────────────────────────────────────────────────────────────────
quarkus.package.jar.type=fast-jar
quarkus.banner.enabled=false

# ── Dev profile (log legible localmente) ─────────────────────────────────────
%dev.quarkus.log.console.json=false
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.level=DEBUG
