# ── Servidor ─────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# ── Aplicación ───────────────────────────────────────────────────────────────
quarkus.application.name=tienda-api
quarkus.application.version=v1

# ── Health (SmallRye) ────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
quarkus.smallrye-health.liveness-path=/health/live
quarkus.smallrye-health.readiness-path=/health/ready

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n

# ── Packaging: fast-jar (recomendado para contenedores) ─────────────────────
quarkus.package.jar.type=fast-jar

# ── OpenShift / Kubernetes ────────────────────────────────────────────────────
# Banners en producción off (reduce noise en logs)
quarkus.banner.enabled=false
