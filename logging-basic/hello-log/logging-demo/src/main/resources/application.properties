# =============================================================================
# application.properties — logging-demo
# =============================================================================
quarkus.application.name=logging-demo

# ─── HTTP ────────────────────────────────────────────────────────
quarkus.http.port=8080

# =============================================================================
# LOGGING — producción
# =============================================================================

# Nivel global
quarkus.log.level=INFO

# Niveles por paquete
quarkus.log.category."com.workshop".level=DEBUG
#quarkus.log.category."io.quarkus".level=WARN
#quarkus.log.category."org.hibernate".level=WARN
#quarkus.log.category."io.netty".level=WARN

## Desactivar la consola de texto plano en producción
## (el handler JSON ya escribe a stdout)
#quarkus.log.console.enable=false
#
## =============================================================================
## LOGGING — perfil dev (quarkus dev / ./mvnw quarkus:dev)
## =============================================================================
#
## En dev: texto plano con colores, más legible en terminal
%dev.quarkus.log.handler.json.enabled=false
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.level=DEBUG
%dev.quarkus.log.category."com.workshop".level=TRACE

# ─── Health ──────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
