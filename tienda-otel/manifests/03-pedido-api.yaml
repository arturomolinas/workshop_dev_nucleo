---
# ─── Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pedido-api
  namespace: tienda-otel
  labels:
    app: pedido-api
    app.kubernetes.io/part-of: tienda-otel
  annotations:
    app.openshift.io/connects-to: >-
      [{"apiVersion":"apps/v1","kind":"Deployment","name":"producto-api"},
       {"apiVersion":"apps/v1","kind":"Deployment","name":"notificacion-api"},
       {"apiVersion":"apps/v1","kind":"Deployment","name":"postgresql"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pedido-api
  template:
    metadata:
      labels:
        app: pedido-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/q/metrics"
        prometheus.io/port:   "8080"
    spec:
      containers:
        - name: pedido-api
          image: quay-registry-quay-quay.apps.cluster-kc4hf.dynamic.redhatworkshops.io/developer/pedido:v1
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: tienda
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRESQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRESQL_PASSWORD
            - name: PRODUCTO_API_URL
              value: http://producto-api:8080
            - name: NOTIFICACION_API_URL
              value: http://notificacion-api:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# ─── Service ─────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pedido-api
  namespace: tienda-otel
spec:
  selector:
    app: pedido-api
  ports:
    - port: 8080
      targetPort: 8080

---
# ─── Route (punto de entrada público) ────────────────────────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pedido-api
  namespace: tienda-otel
  labels:
    app: pedido-api
spec:
  to:
    kind: Service
    name: pedido-api
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
