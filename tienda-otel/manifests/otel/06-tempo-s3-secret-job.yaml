---
# ─────────────────────────────────────────────────────────────────
# Secret "tempo-s3-credentials"
#
# Tempo espera un Secret con estas claves exactas:
#   endpoint, name (bucket), access_key_id, access_key_secret
#
# ODF genera dos recursos distintos con el mismo nombre que el OBC:
#   ConfigMap  "tempo-s3-bucket"  → BUCKET_HOST, BUCKET_NAME, BUCKET_PORT
#   Secret     "tempo-s3-bucket"  → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#
# Este Job los lee y construye el Secret final usando la CLI de OCP.
# Ejecutar DESPUÉS de que el OBC esté en estado Bound.
#
# Verificar estado del OBC:
#   oc get obc tempo-s3-bucket -n openshift-opentelemetry-operator
#
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo-s3-setup
  namespace: openshift-opentelemetry-operator

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tempo-s3-setup
  namespace: openshift-opentelemetry-operator
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tempo-s3-setup
  namespace: openshift-opentelemetry-operator
subjects:
  - kind: ServiceAccount
    name: tempo-s3-setup
    namespace: openshift-opentelemetry-operator
roleRef:
  kind: Role
  name: tempo-s3-setup
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: batch/v1
kind: Job
metadata:
  name: tempo-s3-secret-builder
  namespace: openshift-opentelemetry-operator
spec:
  template:
    spec:
      serviceAccountName: tempo-s3-setup
      restartPolicy: OnFailure
      containers:
        - name: builder
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              NS="openshift-opentelemetry-operator"

              #echo "Esperando que el OBC esté Bound..."
              #for i in $(seq 1 30); do
              #  PHASE=$(oc get obc tempo-s3-bucket -n "$NS" \
              #          -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
              #  [ "$PHASE" = "Bound" ] && break
              #  echo "  intento $i/30 — fase: $PHASE"
              #  sleep 5
              #done

              #if [ "$(oc get obc tempo-s3-bucket -n "$NS" \
              #         -o jsonpath='{.status.phase}')" != "Bound" ]; then
              #  echo "ERROR: OBC no alcanzó estado Bound en 150s"
              #  exit 1
              #fi

              # Leer valores del ConfigMap generado por ODF
              BUCKET_HOST=$(oc get cm tempo-s3-bucket -n "$NS" \
                             -o jsonpath='{.data.BUCKET_HOST}')
              BUCKET_PORT=$(oc get cm tempo-s3-bucket -n "$NS" \
                             -o jsonpath='{.data.BUCKET_PORT}')
              BUCKET_NAME=$(oc get cm tempo-s3-bucket -n "$NS" \
                             -o jsonpath='{.data.BUCKET_NAME}')

              # Leer credenciales del Secret generado por ODF
              ACCESS_KEY=$(oc get secret tempo-s3-bucket -n "$NS" \
                            -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              SECRET_KEY=$(oc get secret tempo-s3-bucket -n "$NS" \
                            -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

              ENDPOINT="http://${BUCKET_HOST}:${BUCKET_PORT}"
              echo "Bucket: $BUCKET_NAME  Endpoint: $ENDPOINT"

              # Crear/actualizar el Secret que Tempo consume
              oc create secret generic tempo-s3-credentials \
                --from-literal=endpoint="$ENDPOINT" \
                --from-literal=bucket="$BUCKET_NAME" \
                --from-literal=access_key_id="$ACCESS_KEY" \
                --from-literal=access_key_secret="$SECRET_KEY" \
                -n "$NS" \
                --dry-run=client -o yaml | oc apply -f -

              echo "Secret 'tempo-s3-credentials' creado/actualizado correctamente."
